services:
  postgres:
    image: postgres:16-alpine
    container_name: banking-agent-db
    environment:
      POSTGRES_DB: banking
      POSTGRES_USER: banking
      POSTGRES_PASSWORD: banking
    ports:
      - "5433:5432"
    volumes:
      - banking_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banking -d banking"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  banking_data:
